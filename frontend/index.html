<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTG — Deck Builder</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Langelier Tactical Game — Deck Builder</h1>
    <div class="actions">
      <button id="btn-new">Create New</button>
      <button id="btn-load">Load</button>
      <input type="file" id="file-import" accept="application/json" hidden />
      <button id="btn-save">Save</button>
      <button id="btn-export">Export JSON</button>
    </div>
  </header>

  <main>
    <section class="panel" id="character-panel">
      <h2>Character</h2>
      <label>Name <input id="char-name" type="text" /></label>
      <label>Description
        <textarea id="char-desc" rows="3"></textarea>
      </label>
      <div class="field">
        <span>Colours (1–3)</span>
        <div id="color-pick" class="pip-row"></div>
      </div>
      <div class="field">
        <span>Starting mana (pick 2)</span>
        <div id="mana-pick" class="pip-row"></div>
      </div>
    </section>

    <section class="panel" id="search-panel">
      <h2>Add cards</h2>
      <div class="search-row">
        <input id="search-input" type="text" placeholder="Search MTG card name…" />
        <button id="btn-search">Search</button>
      </div>
      <ul id="search-results" class="results"></ul>
    </section>

    <section class="panel" id="status-panel">
      <h2>Deck status</h2>
      <div id="status-body" class="status">No cards yet.</div>
    </section>

    <section class="panel wide" id="deck-panel">
      <h2>Deck (<span id="deck-count">0</span>)</h2>
      <table id="deck-table">
        <thead>
          <tr>
            <th>Name (flavour)</th><th>Source</th><th>Cost</th>
            <th>Type</th><th>Rarity</th><th></th>
          </tr>
        </thead>
        <tbody id="deck-body"></tbody>
      </table>
    </section>
  </main>

  <div id="detail-overlay" class="overlay hidden">
    <div class="detail-card" id="detail-card"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
